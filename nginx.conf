# APEX — Nginx Reverse Proxy Configuration
# Install: sudo cp nginx.conf /etc/nginx/sites-available/apex
#          sudo ln -sf /etc/nginx/sites-available/apex /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
#
# REQUIRED: Add this line inside the http {} block of /etc/nginx/nginx.conf:
#   limit_req_zone $binary_remote_addr zone=webhooks:10m rate=10r/s;

# ─── HTTP → HTTPS redirect ─────────────────────────────────────────────
server {
    listen 80;
    server_name apex.yourdomain.com;
    return 301 https://$server_name$request_uri;
}

# ─── Main HTTPS Server ─────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name apex.yourdomain.com;

    # SSL — managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/apex.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/apex.yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ─── Security Headers ──────────────────────────────────────────────
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # ─── Gzip Compression ──────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;
    gzip_vary on;

    # ─── Health Check (no auth, fast timeout) ──────────────────────────
    location /api/health {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_read_timeout 5s;
    }

    # ─── Webhooks (longer timeout, rate limited) ───────────────────────
    location /api/webhooks/ {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        limit_req          zone=webhooks burst=20 nodelay;
    }

    # ─── Main App (Next.js) ───────────────────────────────────────────
    location / {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
