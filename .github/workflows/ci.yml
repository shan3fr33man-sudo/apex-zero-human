name: APEX CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeCheck — apps/web
        run: npx tsc --noEmit -p apps/web/tsconfig.json

      - name: TypeCheck — apps/orchestrator
        run: npx tsc --noEmit -p apps/orchestrator/tsconfig.json

      - name: TypeCheck — skills
        run: npx tsc --noEmit -p skills/tsconfig.json

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run vitest
        run: npx vitest run --reporter=verbose
        continue-on-error: true  # Tests are Phase 8 — don't block CI until then

  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build --workspace=apps/web
        env:
          # Stub env vars for build — actual values are on the VPS
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          SUPABASE_SERVICE_ROLE_KEY: placeholder

  # NOTE: Deployment is MANUAL via scripts/deploy.sh on the Hostinger VPS.
  # CI never auto-deploys. This pipeline is typecheck + test + build only.
